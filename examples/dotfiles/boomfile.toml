# An example boomfile.toml — a runnable reference for the resource types and phase order.
# Copy the pieces you need into your own dotfiles repo; `boom doctor --config` checks it.

# A top-level [boom] table folds boom's own self-wiring into the reconcile it already runs:
# keep the Claude skill fresh, nudge on a new release, and manage scheduled boom verify /
# code fetch launchd timers (macOS) — instead of hand-rolling those as run/plist steps.
[boom]
skill_on_sync = true             # regenerate ~/.claude/skills/boom/SKILL.md each sync
upgrade_check_on_sync = true     # warn when a newer boom release ships (offline-safe)
verify_schedule = "15m"          # launchd timer: boom verify every 15m (macOS-only)
code_fetch_schedule = "15m"      # launchd timer: git-fetch every code repo (keep origin warm)

[[section]]
name = "Shell + git"

[[section.link]]
src = ".zshrc"
dst = "~/.zshrc"

[[section.link]]
src = ".zprofile"
dst = "~/.zprofile"

[[section.link]]
src = ".zshenv"
dst = "~/.zshenv"

[[section.link]]
src = ".hushlogin"
dst = "~/.hushlogin"

[[section.link]]
src = ".gitconfig"
dst = "~/.gitconfig"

[[section.link]]
src = ".gitmessage"
dst = "~/.gitmessage"

[[section.link]]
src = ".gitignore"
dst = "~/.gitignore"

[[section.link]]
src = ".editorconfig"
dst = "~/.editorconfig"

[[section.link]]
src = ".ripgreprc"
dst = "~/.ripgreprc"

[[section.link]]
src = ".fdignore"
dst = "~/.fdignore"

[[section.link]]
src = "git-template/hooks/pre-commit"
dst = "~/.config/git/template/hooks/pre-commit"

[[section]]
name = "SSH"

[[section.link]]
src = "ssh/config"
dst = "~/.ssh/config"
mode = "600"

[[section.link]]
src = "ssh/1password-agent.toml"
dst = "~/.config/1Password/ssh/agent.toml"

[[section]]
name = "Tools"

[[section.link]]
src = "mise.toml"
dst = "~/.config/mise/config.toml"

[[section.link]]
src = "mise-settings.toml"
dst = "~/.config/mise/conf.d/settings.toml"

[[section.link]]
src = "sheldon/plugins.toml"
dst = "~/.config/sheldon/plugins.toml"

[[section.link]]
src = "starship.toml"
dst = "~/.config/starship.toml"

[[section.link]]
src = "cmux/cmux.json"
dst = "~/.config/cmux/cmux.json"

[[section.link]]
src = "ghostty/config"
dst = "~/.config/ghostty/config"

[[section.link]]
src = "bat/config"
dst = "~/.config/bat/config"

[[section.link]]
src = "atuin/config.toml"
dst = "~/.config/atuin/config.toml"

[[section.link]]
src = "gh/config.yml"
dst = "~/.config/gh/config.yml"

[[section.link]]
src = "nvim/init.lua"
dst = "~/.config/nvim/init.lua"

[[section.link]]
src = "karabiner/karabiner.json"
dst = "~/.config/karabiner/karabiner.json"

[[section]]
name = "Claude"

[[section.link]]
src = "dot-claude/CLAUDE.md"
dst = "~/.claude/CLAUDE.md"

[[section.link]]
src = "dot-claude/settings.json"
dst = "~/.claude/settings.json"

[[section]]
name = "zsh fragments"
brewfile = "Brewfile"
mise = true

[[section.glob]]
pattern = "zsh/[0-9]*.zsh"
into = "~/.config/zsh/"

[[section]]
name = "SSH perms"

# `dir` ensures a standalone directory exists with a mode — the declarative form of the
# mkdir -p/chmod run steps this used to be. `manage = true` would remove it on uninstall
# (only if empty); omitted here since ~/.ssh holds user data.
[[section.dir]]
path = "~/.ssh"
mode = "700"

[[section.dir]]
path = "~/.ssh/cm"
mode = "700"

[[section]]
name = "Guardrails"

# `check` runs on verify: every `present` regex must match the file, every `absent` must
# not — folded into `boom verify`'s exit code and JSON report. The legible form of a
# grep-in-a-run guardrail.
[[section.check]]
file = "~/.gitconfig"
present = ["\\[user\\]"]
message = "git identity not configured"

[[section]]
name = "LaunchAgents"
when = { os = "darwin" }

# `launchd` links a plist into ~/Library/LaunchAgents and owns its launchctl lifecycle
# (load -w on sync, unload on uninstall) — no copy-pasted `launchctl unload; load -w` dance.
[[section.launchd]]
src = "launchd/com.example.agent.plist"

[[section]]
name = "lefthook"

[[section.run]]
on = "sync"
cmd = "lefthook install"

[[section]]
name = "op-agent"

[[section.link]]
src = "hooks/op-agent.sh"
dst = "~/.local/bin/op-agent"

[[section.run]]
on = "sync"
cmd = "op-agent provision"

[[section.run]]
on = "verify"
cmd = "op-agent status"
