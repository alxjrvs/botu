# An example boomfile.toml — a runnable reference for the resource types and phase order.
# Copy the pieces you need into your own dotfiles repo; `boom validate` checks it.

[[section]]
name = "Shell + git"

[[section.link]]
src = ".zshrc"
dst = "~/.zshrc"

[[section.link]]
src = ".zprofile"
dst = "~/.zprofile"

[[section.link]]
src = ".zshenv"
dst = "~/.zshenv"

[[section.link]]
src = ".hushlogin"
dst = "~/.hushlogin"

[[section.link]]
src = ".gitconfig"
dst = "~/.gitconfig"

[[section.link]]
src = ".gitmessage"
dst = "~/.gitmessage"

[[section.link]]
src = ".gitignore"
dst = "~/.gitignore"

[[section.link]]
src = ".editorconfig"
dst = "~/.editorconfig"

[[section.link]]
src = ".ripgreprc"
dst = "~/.ripgreprc"

[[section.link]]
src = ".fdignore"
dst = "~/.fdignore"

[[section.link]]
src = "git-template/hooks/pre-commit"
dst = "~/.config/git/template/hooks/pre-commit"

[[section]]
name = "SSH"

[[section.link]]
src = "ssh/config"
dst = "~/.ssh/config"
mode = "600"

[[section.link]]
src = "ssh/1password-agent.toml"
dst = "~/.config/1Password/ssh/agent.toml"

[[section]]
name = "Tools"

[[section.link]]
src = "mise.toml"
dst = "~/.config/mise/config.toml"

[[section.link]]
src = "mise-settings.toml"
dst = "~/.config/mise/conf.d/settings.toml"

[[section.link]]
src = "sheldon/plugins.toml"
dst = "~/.config/sheldon/plugins.toml"

[[section.link]]
src = "starship.toml"
dst = "~/.config/starship.toml"

[[section.link]]
src = "cmux/cmux.json"
dst = "~/.config/cmux/cmux.json"

[[section.link]]
src = "ghostty/config"
dst = "~/.config/ghostty/config"

[[section.link]]
src = "bat/config"
dst = "~/.config/bat/config"

[[section.link]]
src = "atuin/config.toml"
dst = "~/.config/atuin/config.toml"

[[section.link]]
src = "gh/config.yml"
dst = "~/.config/gh/config.yml"

[[section.link]]
src = "nvim/init.lua"
dst = "~/.config/nvim/init.lua"

[[section.link]]
src = "karabiner/karabiner.json"
dst = "~/.config/karabiner/karabiner.json"

[[section]]
name = "Claude"

[[section.link]]
src = "dot-claude/CLAUDE.md"
dst = "~/.claude/CLAUDE.md"

[[section.link]]
src = "dot-claude/settings.json"
dst = "~/.claude/settings.json"

[[section]]
name = "zsh fragments"
brewfile = "Brewfile"
mise = true

[[section.glob]]
pattern = "zsh/[0-9]*.zsh"
into = "~/.config/zsh/"

[[section]]
name = "SSH perms"

[[section.run]]
on = "sync"
cmd = "chmod 700 ~/.ssh"

[[section.run]]
on = "sync"
cmd = "mkdir -p ~/.ssh/cm"

[[section.run]]
on = "sync"
cmd = "chmod 700 ~/.ssh/cm"

[[section]]
name = "lefthook"

[[section.run]]
on = "sync"
cmd = "lefthook install"

[[section]]
name = "op-agent"

[[section.link]]
src = "hooks/op-agent.sh"
dst = "~/.local/bin/op-agent"

[[section.run]]
on = "sync"
cmd = "op-agent provision"

[[section.run]]
on = "verify"
cmd = "op-agent status"
