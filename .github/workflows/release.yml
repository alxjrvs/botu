name: release

# Version-driven continuous release. A push to main that changes package.json cuts a
# GitHub release for that version — the cross-compiled binary matrix + checksums are
# attached and the tag is created — unless that version already shipped. So the flow is
# just: bump the version in a PR, merge, and install.sh / the Homebrew formula are both
# updated here by CI. The release is gated on the same checks ci runs, so a red tree never
# ships. Bun compiles every target from one Linux host (job: build); the macOS binaries
# are then signed + notarized on a real macOS host (job: sign-macos) before the release
# is assembled and the checksums computed over the *final* binaries (job: release). A
# final job (formula) writes the shipped version + sha256s into Formula/boom.rb and opens
# an auto-merging PR — main is protected, so the formula bump can't be pushed directly.
#
# Fully-automated formula bumps need a RELEASE_PAT secret (a fine-grained PAT scoped to
# this repo with contents:write + pull-requests:write). A PR opened by the default
# GITHUB_TOKEN does NOT trigger the required ci checks, so its auto-merge would stall;
# a real PAT makes the checks fire and the PR self-merges. Without RELEASE_PAT the job
# still opens the formula PR — it just waits for a human to merge it.
#
# macOS code-signing is opt-in via repo secrets — until they exist, the macOS binaries
# are ad-hoc signed on the macOS runner (valid for Apple Silicon; Gatekeeper still
# prompts for browser-downloaded copies, but curl/Homebrew installs run clean). Add all
# of these secrets to switch on real Developer ID signing + notarization:
#   MACOS_CERT_P12        base64 of a "Developer ID Application" .p12
#   MACOS_CERT_PASSWORD   the .p12 export password
#   MACOS_SIGN_IDENTITY   e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID, APPLE_TEAM_ID, APPLE_APP_PASSWORD   notarytool credentials (app-specific pw)
# (A bare Mach-O binary can't be stapled, so notarization registers the hash with Apple's
# service; Gatekeeper verifies online on first launch.)
on:
  push:
    branches: [main]
    paths: ["package.json"]
  workflow_dispatch: # manual re-trigger (e.g. re-run a release after a CI fix)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      new: ${{ steps.v.outputs.new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the tags to tell whether this version already shipped
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile

      # Gate the release on the same checks ci enforces — never ship a red tree.
      - name: Lint + format (biome)
        run: bunx biome check .
      - name: Typecheck (tsc)
        run: bunx tsc --noEmit
      - name: Test (bun test)
        run: bun test

      # The version in package.json is the single control: release it only if its tag
      # doesn't yet exist, so a package.json edit that doesn't bump the version (e.g. a
      # dependency change) is a no-op rather than a duplicate release.
      - name: Resolve version + novelty
        id: v
        run: |
          version="$(jq -r .version package.json)"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$version" > /dev/null 2>&1; then
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "::notice::v$version already released — skipping"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

      # No --bytecode: it requires CommonJS and rejects the top-level await in
      # src/index.ts. Matches ci's compile step and the shipped binary.
      - name: Compile the target matrix
        if: steps.v.outputs.new == 'true'
        run: |
          mkdir -p dist
          for t in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64; do
            bun build src/index.ts --compile --target="$t" --outfile "dist/boom-$t"
          done

      - name: Upload unsigned binaries
        if: steps.v.outputs.new == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: boom-unsigned
          path: dist/boom-*

  # Sign (+ notarize, when secrets are present) the macOS binaries on a real macOS host.
  # Cross-compiled-on-Linux Mach-O binaries carry an ad-hoc signature Apple Silicon's
  # kernel rejects; re-signing here with native `codesign` produces a valid one.
  sign-macos:
    needs: build
    if: needs.build.outputs.new == 'true'
    runs-on: macos-latest
    env:
      # Evaluates to the string "true"/"false" without ever exposing the secret value.
      HAS_SIGNING: ${{ secrets.MACOS_CERT_P12 != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: boom-unsigned
          path: dist

      - name: Developer ID sign + notarize
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          # Import the signing cert into a throwaway keychain unlocked for this job only.
          KEYCHAIN="$RUNNER_TEMP/boom-signing.keychain-db"
          KP="$(uuidgen)"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" "$(security default-keychain | tr -d ' "')"

          for b in dist/boom-bun-darwin-arm64 dist/boom-bun-darwin-x64; do
            codesign --force --options runtime --timestamp --keychain "$KEYCHAIN" \
              --sign "$MACOS_SIGN_IDENTITY" "$b"
            # A bare binary can't be stapled; notarize a zip so the hash is registered.
            ditto -c -k "$b" "$b.zip"
            xcrun notarytool submit "$b.zip" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" --wait
            rm -f "$b.zip"
          done

      - name: Ad-hoc sign (no signing secrets configured)
        if: env.HAS_SIGNING != 'true'
        run: |
          set -euo pipefail
          for b in dist/boom-bun-darwin-arm64 dist/boom-bun-darwin-x64; do
            codesign --force --sign - "$b"
          done

      - name: Upload signed macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: boom-darwin-signed
          path: dist/boom-bun-darwin-*

  release:
    needs: [build, sign-macos]
    if: needs.build.outputs.new == 'true'
    runs-on: ubuntu-latest
    steps:
      # Linux binary from the build job; the signed macOS binaries override their unsigned
      # counterparts. download-artifact merges into the same dir, signed copies last.
      - uses: actions/download-artifact@v4
        with:
          name: boom-unsigned
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: boom-darwin-signed
          path: dist

      # Checksums must cover the *final* (signed) binaries — `boom upgrade` and install.sh
      # verify against this manifest, so it has to match exactly what ships.
      - name: Checksums
        run: cd dist && sha256sum boom-* > SHA256SUMS

      - name: Tag + release with the binaries attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          files: |
            dist/boom-*
            dist/SHA256SUMS

  # The repo doubles as its own Homebrew tap, so Formula/boom.rb on main must carry the
  # shipped version + the sha256 of each released binary. main is protected (no direct
  # push), so we bump the formula on a branch and open an auto-merging PR. The sha256s
  # come from the release's own SHA256SUMS — the exact bytes that shipped.
  formula:
    needs: [build, release]
    if: needs.build.outputs.new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Check out with RELEASE_PAT when present: a PR whose branch was pushed by the
      # default token can't trigger the required ci checks, so it could never auto-merge.
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Fetch the release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ needs.build.outputs.tag }}" -R "${{ github.repository }}" -p SHA256SUMS -D /tmp

      - name: Write version + sha256s into Formula/boom.rb
        run: |
          set -euo pipefail
          tag="${{ needs.build.outputs.tag }}"; version="${tag#v}"
          sha() { awk -v f="$1" '$2 == "*"f || $2 == f {print $1}' /tmp/SHA256SUMS; }
          arm="$(sha boom-bun-darwin-arm64)"
          intel="$(sha boom-bun-darwin-x64)"
          linux="$(sha boom-bun-linux-x64)"
          for v in "$arm" "$intel" "$linux"; do
            [ -n "$v" ] || { echo "::error::missing sha256 in SHA256SUMS"; exit 1; }
          done
          # Rewrite each sha256 line by the arch of the url line just above it, so this
          # works on the first release (placeholders) and every release after (real shas).
          awk -v arm="$arm" -v intel="$intel" -v linux="$linux" '
            /url .*boom-bun-darwin-arm64/ { a = "arm" }
            /url .*boom-bun-darwin-x64/   { a = "intel" }
            /url .*boom-bun-linux-x64/    { a = "linux" }
            /sha256 "/ {
              s = (a == "arm" ? arm : a == "intel" ? intel : linux)
              sub(/sha256 "[^"]*"/, "sha256 \"" s "\"")
            }
            { print }
          ' Formula/boom.rb > Formula/boom.rb.new
          sed -E "s/^  version \"[^\"]*\"/  version \"$version\"/" Formula/boom.rb.new > Formula/boom.rb
          rm -f Formula/boom.rb.new

      - name: Open an auto-merging formula PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
          HAS_PAT: ${{ secrets.RELEASE_PAT != '' }}
        run: |
          set -euo pipefail
          tag="${{ needs.build.outputs.tag }}"
          if git diff --quiet -- Formula/boom.rb; then
            echo "::notice::Formula/boom.rb already current for $tag — nothing to do"
            exit 0
          fi
          branch="formula/$tag"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add Formula/boom.rb
          git commit -m "chore(formula): boom $tag"
          git push -u origin "$branch" --force-with-lease
          gh pr create --base main --head "$branch" \
            --title "chore(formula): boom $tag" \
            --body "Automated Homebrew formula bump for **$tag** — version + sha256s from the release's SHA256SUMS."
          if [ "$HAS_PAT" = "true" ]; then
            gh pr merge "$branch" --auto --squash --delete-branch
          else
            echo "::warning::RELEASE_PAT not set — formula PR opened but left for manual merge (a GITHUB_TOKEN PR does not trigger the required checks). Add a fine-grained RELEASE_PAT (contents + pull-requests write on this repo) to fully automate."
          fi
