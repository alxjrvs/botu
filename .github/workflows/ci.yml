name: ci

# The checks `make check` runs locally, on every push and PR. Runs on Linux and
# macOS: boom targets both, and the compiled binary must boot on each.
on:
  push:
    branches: [main, v2/typescript]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile

      - name: Lint + format (biome)
        run: bunx biome check .

      - name: Typecheck (tsc)
        run: bunx tsc --noEmit

      - name: Test (bun test)
        run: bun test

      - name: Compile host binary
        run: bun build src/index.ts --compile --outfile build/boom

      - name: Smoke — binary boots
        run: ./build/boom --version

      # Smoke the config-free generators so a broken catalog/route fails CI, not a user.
      - name: Smoke — completions + man + skill
        run: |
          ./build/boom completions bash > /dev/null
          ./build/boom completions zsh > /dev/null
          ./build/boom completions fish > /dev/null
          ./build/boom man > /dev/null
          ./build/boom skill > /dev/null

      # Validate the shipped example against the live schema, so a schema change can't
      # silently invalidate the config every new user is pointed at while CI stays green.
      - name: Smoke — example boomfile validates
        run: BOOM_CONFIG=examples/dotfiles ./build/boom validate

  version-guard:
    # Every PR must move package.json's version exactly one semver step from main —
    # patch (x.y.z+1), minor (x.y+1.0), or major (x+1.0.0) — or leave it unchanged.
    # Never skip (0.0.1→0.0.3) or jump (0.0.1→3.0.0): one merge, at most one release.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce a single-step version bump vs main
        run: |
          git fetch -q origin main
          base=$(git show origin/main:package.json | jq -r .version)
          head=$(jq -r .version package.json)
          echo "main: $base   this PR: $head"
          IFS=. read -r bM bm bp <<<"$base"
          IFS=. read -r hM hm hp <<<"$head"
          ok=0
          [ "$head" = "$base" ] && ok=1                                              # unchanged
          [ "$hM" = "$bM" ] && [ "$hm" = "$bm" ] && [ "$hp" = "$((bp+1))" ] && ok=1   # patch
          [ "$hM" = "$bM" ] && [ "$hm" = "$((bm+1))" ] && [ "$hp" = 0 ] && ok=1       # minor
          [ "$hM" = "$((bM+1))" ] && [ "$hm" = 0 ] && [ "$hp" = 0 ] && ok=1           # major
          if [ "$ok" != 1 ]; then
            echo "::error::version must be one step from main ($base): patch $bM.$bm.$((bp+1)), minor $bM.$((bm+1)).0, major $((bM+1)).0.0, or unchanged — got $head"
            exit 1
          fi
          echo "version OK: $base -> $head"

  cross-compile:
    # Bun cross-compiles every target from one host; prove the release matrix builds.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Cross-compile release matrix
        run: |
          for t in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64 bun-linux-arm64; do
            bun build src/index.ts --compile --target="$t" --outfile "build/boom-$t"
          done
