name: ci

# The checks `make check` runs locally, on every push and PR. Runs on Linux and
# macOS: botu targets both, and the compiled binary must boot on each.
on:
  push:
    branches: [main, v2/typescript]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile

      - name: Lint + format (biome)
        run: bunx biome check .

      - name: Typecheck (tsc)
        run: bunx tsc --noEmit

      - name: Test (bun test)
        run: bun test

      - name: Compile host binary
        run: bun build src/index.ts --compile --outfile build/botu

      - name: Smoke — binary boots
        run: ./build/botu --version

  cross-compile:
    # Bun cross-compiles every target from one host; prove the release matrix builds.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Cross-compile release matrix
        run: |
          for t in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64; do
            bun build src/index.ts --compile --target="$t" --outfile "build/botu-$t"
          done
